name: collector-image
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# C13 — deny-all par défaut ; permissions minimales déclarées par job
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gitleaks-action liste les commits de la PR (event pull_request) — sinon 403
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - run: npm ci
      - run: sha256sum -c web/public/walletkit.js.sha256
      - run: npm audit --audit-level=high --omit=dev
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # PR-only: validate the (Alpine) image builds on amd64 without publishing. The native musl
  # toolchain (usb/crypto) only compiles in CI here, so a broken Dockerfile fails the PR.
  build-check:
    needs: [test, security]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # required to write GHA layer cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@b5730b40dd34b49d4e39cc74bddf4e55dce7bab7 # v3.10.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push:
    needs: [test, security]
    # push sur main → image :edge + :sha-xxxx (tip de la branche, mutable) ; tag v* → :X.Y.Z + :latest (release figée).
    # Les PR ne publient rien (login GHCR impossible depuis un fork). Discipline prod : pin une version, jamais :edge/:latest.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write   # required to write GHA layer cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@b5730b40dd34b49d4e39cc74bddf4e55dce7bab7 # v3.10.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/decantfi-collector
          # metadata-action ajoute le label org.opencontainers.image.source → rattache le package au repo (onglet Packages).
          tags: |
            type=edge,branch=main
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REV=${{ github.sha }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # créer la GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Changelog auto-généré par GitHub (PRs/commits depuis le tag précédent) + pointeur image.
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" --jq .body)
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "## Image

          \`\`\`yaml
          image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/decantfi-collector:${GITHUB_REF_NAME#v}
          \`\`\`

          ${notes}"
