<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stellarswap — compagnon de swap</title>
<style>
:root{
  --bg:#f1f5f9; --card-bg:#ffffff; --card-border:#e2e8f0; --section-bg:#f8fafc;
  --val:#0f172a; --caption:#64748b; --sub:#94a3b8; --heading:#475569;
  --accent:#2563eb; --amber:#d97706; --green:#16a34a; --red:#dc2626; --tool:#ea580c; --select:#7c3aed;
}
:root.dark{
  --bg:#0f172a; --card-bg:#1e293b; --card-border:#334155; --section-bg:#0f172a;
  --val:#f1f5f9; --caption:#94a3b8; --sub:#64748b; --heading:#cbd5e1;
  --accent:#3b82f6; --amber:#f59e0b; --green:#22c55e; --red:#ef4444; --tool:#f97316; --select:#8b5cf6;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--val);
  font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; -webkit-font-smoothing:antialiased;}
.page{max-width:1180px; margin:0 auto; padding:1.1rem 1.25rem 5rem;}

.topbar{display:flex; align-items:center; gap:.7rem; margin-bottom:1rem; flex-wrap:wrap;}
.brand{font-size:15px; font-weight:700; letter-spacing:-.01em;}
.brand .dim{color:var(--caption); font-weight:600;}
.pagenav{display:inline-flex; gap:4px; background:var(--section-bg); border:1px solid var(--card-border); border-radius:9999px; padding:3px;}
.pagenav button{border:0; background:transparent; color:var(--caption); font-size:13px; font-weight:700; padding:5px 16px; border-radius:9999px; cursor:pointer; transition:all .15s;}
.pagenav button.active{background:#1e293b; color:#fff;}
.dark .pagenav button.active{background:#e2e8f0; color:#0f172a;}
.fresh{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--caption);
  background:var(--card-bg); border:1px solid var(--card-border); border-radius:9999px; padding:2px 9px;}
.fresh .dot{width:7px; height:7px; border-radius:9999px; background:var(--green);}
.tznote{font-size:11px; color:var(--sub);}

/* Topbar right controls (theme + lang) */
.topbar-right{margin-left:auto; display:inline-flex; align-items:center; gap:.45rem;}
.ctrl-btn{background:transparent; border:1px solid var(--card-border); color:var(--caption); border-radius:6px; padding:3px 8px; cursor:pointer; font-size:11px; font-weight:600;}
.ctrl-btn:hover{background:var(--section-bg);}
/* .ctrl-btn.active-lang — supprimé (un seul bouton drapeau) */

/* Refresh controls */
.refresh-wrap{display:inline-flex; align-items:center; gap:.45rem; flex-wrap:wrap;}
.refresh-note{font-size:11px; color:var(--caption);}

.zone{margin-bottom:2.2rem;}
.zone-h{font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--heading);
  margin:0 0 .55rem; display:flex; align-items:center; gap:.5rem;}
.zone-h .right{margin-left:auto; font-weight:600; letter-spacing:0; text-transform:none;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:.75rem;}
.grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:.75rem;}
@media(max-width:880px){.grid2{grid-template-columns:1fr;} .grid4{grid-template-columns:1fr 1fr;}}

.sim{border:1px solid var(--card-border); background:var(--card-bg); border-radius:.7rem; padding:1rem 1.1rem;}
.sim .controls{display:flex; gap:.55rem; flex-wrap:wrap; align-items:center;}
.sim label{font-size:11px; color:var(--caption); font-weight:600; text-transform:uppercase; letter-spacing:.05em; width:100%;}
.sim input{font-size:15px; padding:.5rem .7rem; border-radius:.5rem; border:1px solid var(--card-border);
  background:var(--section-bg); color:var(--val); width:150px; font-variant-numeric:tabular-nums;}
.suffix{font-size:13px; color:var(--sub); font-weight:600;}
.btn{font-size:12px; font-weight:600; padding:.52rem .9rem; border-radius:.5rem; border:1px solid var(--card-border);
  background:var(--section-bg); color:var(--val); cursor:pointer;}
.btn.primary{background:#0d9488; border-color:#0d9488; color:#fff;}
.dark .btn.primary{background:#14b8a6; border-color:#14b8a6; color:#04201d;}
.sim .result{margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--card-border);
  display:flex; align-items:baseline; gap:.6rem; flex-wrap:wrap;}
.sim .result .meta{font-size:12px; color:var(--caption); font-variant-numeric:tabular-nums;}

.kpi{display:flex; flex-direction:column; gap:.25rem; border-radius:.5rem; border:1px solid var(--card-border); background:var(--card-bg); padding:.55rem 1rem;}
.kpi.hero .v{font-size:28px;} .kpi.hero{padding:.8rem 1.05rem; gap:.3rem;}
.kpi .v{font-size:20px; font-weight:600; line-height:1.1; color:var(--val); font-variant-numeric:tabular-nums;}
.kpi .v .u{margin-left:.25rem; font-size:11px; font-weight:400; color:var(--sub);}
.kpi .v.green{color:var(--green);}
.kpi .c{font-size:12px; font-weight:600; color:var(--caption);}
.kpi .sub{font-size:11px; color:var(--sub); font-variant-numeric:tabular-nums;}

.chip{display:inline-block; border:1px solid; background:transparent; border-radius:9999px; font-weight:600; font-size:11px; padding:0 7px; line-height:1.6; vertical-align:middle;}
.chip.obs{border-color:#4ade80; color:#15803d;} .dark .chip.obs{border-color:#15803d; color:#4ade80;}
.chip.calc{border-color:#60a5fa; color:#1d4ed8;} .dark .chip.calc{border-color:#1d4ed8; color:#60a5fa;}
.chip.est{border-color:#c4b5fd; color:#6d28d9;} .dark .chip.est{border-color:#6d28d9; color:#c4b5fd;}
.tag{font-size:11px; font-weight:600; color:var(--caption); background:var(--section-bg); border:1px solid var(--card-border); border-radius:6px; padding:1px 7px;}
.pos{color:var(--green);} .neg{color:var(--red);}

.routeline{display:flex; align-items:flex-start; gap:.5rem; flex-wrap:wrap;}
.rasset{display:inline-flex; flex-direction:column; align-items:center; gap:3px;}
.asset{font-weight:700; font-size:14px; padding:4px 11px; border-radius:9px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--val);}
.asset.out{color:var(--green); border-color:color-mix(in srgb, var(--green) 45%, var(--card-border));}
.rasset .qty{font-size:13px; font-weight:700; color:var(--val); font-variant-numeric:tabular-nums;}
.rasset .qty.o{color:var(--green);}
.rasset .qty.big{font-size:22px; line-height:1.1;}
.leg{display:inline-flex; flex-direction:column; align-items:center; gap:2px; padding-top:4px;}
.leg .ar{font-size:13px; line-height:1; color:var(--sub);}
.tool{display:inline-block; font-size:13px; font-weight:700; padding:2px 9px; border-radius:7px; background:var(--tool); color:#fff; letter-spacing:-.01em; white-space:nowrap;}
.openlink{display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:600; color:var(--accent); text-decoration:none;
  border:1px solid color-mix(in srgb, var(--accent) 45%, var(--card-border)); border-radius:7px; padding:3px 9px;}
.openlink:hover{background:color-mix(in srgb, var(--accent) 10%, transparent);}
.openlink.btnlike{padding:.52rem .9rem; border-radius:.5rem;}
.seg{display:inline-flex; gap:2px; background:var(--section-bg); border:1px solid var(--card-border); border-radius:9999px; padding:2px; vertical-align:middle;}
.seg button{border:0; background:transparent; color:var(--caption); font-size:11px; font-weight:600; padding:3px 11px; border-radius:9999px; cursor:pointer;}
.seg button.active{background:var(--accent); color:#fff;}

.card{border:1px solid var(--card-border); background:var(--card-bg); border-radius:.7rem; padding:.9rem 1rem;}

/* Tooltip CSS — positionné en dessous pour éviter le clipping overflow de la table */
.tip-wrap{position:relative; display:inline-block; cursor:default;}
.tip-wrap .tip-icon{font-size:10px; color:var(--sub); margin-left:3px; vertical-align:middle; cursor:help;}
.tip-wrap .tip-box{
  display:none; position:absolute; top:calc(100% + 4px); left:50%; transform:translateX(-50%);
  background:var(--val); color:var(--bg); font-size:11px; font-weight:400; line-height:1.45;
  text-transform:none; letter-spacing:0; border-radius:6px; padding:.45rem .65rem;
  white-space:normal; width:260px; z-index:100; pointer-events:none; box-shadow:0 3px 10px rgba(0,0,0,.18);}
.tip-wrap:hover .tip-box{display:block;}
/* Arrow up */
.tip-wrap .tip-box::before{
  content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-bottom-color:var(--val);}

table.flt{width:100%; border-collapse:collapse; font-size:13px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:.6rem; overflow:hidden;}
table.flt th{font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--caption); text-align:right; padding:8px 12px; background:var(--section-bg); font-weight:600; border-bottom:1px solid var(--card-border);}
table.flt th:first-child{text-align:left;}
table.flt th.left{text-align:left;}
table.flt td{padding:8px 12px; text-align:right; color:var(--val); border-bottom:1px solid var(--card-border); font-variant-numeric:tabular-nums;}
table.flt td:first-child{text-align:left;}
table.flt td.left{text-align:left; color:var(--caption);}
table.flt tr:last-child td{border-bottom:0;}
table.flt tr.win td{background:color-mix(in srgb, var(--green) 9%, transparent); font-weight:600;}
.srcname{font-weight:600;} .muted{color:var(--caption);}
.ladder-wrap{position:relative;}
.ladder-wrap.refreshing .ladder-inner{opacity:.4; filter:blur(2px); pointer-events:none; transition:opacity .15s;}
.refresh-overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:.45rem; font-size:12px; font-weight:600; color:var(--caption);}
.refresh-spinner{width:15px; height:15px; border:2px solid var(--card-border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Section temporelle : encart / hebdo / zoom */
.enc{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;}
@media(max-width:760px){.enc{grid-template-columns:1fr;}}
.enck{border:1px solid var(--card-border);border-radius:.55rem;padding:.55rem .75rem;background:var(--section-bg);}
.enck .l{font-size:11px;font-weight:600;color:var(--caption);}
.enck .v{font-size:18px;font-weight:700;line-height:1.15;margin-top:2px;font-variant-numeric:tabular-nums;}
.enck .v.g{color:var(--green);}.enck .v.r{color:var(--red);}
.enck .s{font-size:11px;color:var(--sub);}
.enck .sub2{font-size:11px;color:var(--caption);margin-top:6px;padding-top:5px;border-top:1px solid var(--card-border);}
.enck .sub2 .r{color:var(--red);font-weight:700;}
.heb{display:flex;flex-direction:column;gap:3px;margin-top:.9rem;}
.hrow{display:grid;grid-template-columns:max-content 1fr;gap:13px;align-items:center;padding:2px 3px;border-radius:8px;cursor:pointer;}
.hrow:hover{background:var(--section-bg);}
.hrow.sel{background:color-mix(in srgb,var(--heading) 9%,transparent);outline:2px solid var(--heading);outline-offset:-2px;}
.hlbl{display:flex;align-items:center;gap:8px;padding:5px 9px;border-radius:7px;min-width:212px;}
.hlbl.best{background:color-mix(in srgb,var(--green) 18%,transparent);}
.hlbl .hday{font-size:12px;font-weight:700;width:78px;}
.hlbl .hmean{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.hlbl .hmean small{display:block;font-size:10px;font-weight:600;color:var(--sub);}
.htd{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 50%,var(--card-border));border-radius:5px;padding:1px 5px;}
.hcells{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;}
.hcells .hc{height:16px;border-radius:3px;}
.zm{display:grid;grid-template-columns:185px 1fr;gap:16px;align-items:stretch;}
@media(max-width:680px){.zm{grid-template-columns:1fr;}}
.zmk{border:1px solid var(--card-border);border-radius:.55rem;padding:.7rem .9rem;background:var(--section-bg);display:flex;flex-direction:column;justify-content:center;gap:.15rem;}
.zmk .k{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--caption);}
.zmk .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;}
.zmk .s{font-size:12px;font-weight:600;}
.zwrap{position:relative;}
.zaxis{display:grid;grid-template-columns:repeat(8,1fr);font-size:10px;color:var(--sub);margin-top:4px;}
.zcursor{position:absolute;top:0;bottom:0;width:0;border-left:1px dashed var(--caption);display:none;pointer-events:none;}
.ztip{position:absolute;top:-4px;transform:translateX(-50%);background:var(--val);color:var(--bg);font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;display:none;pointer-events:none;}
.pulse{animation:pl 2.6s ease-in-out infinite;}@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}

.dist{display:grid; grid-template-columns:max-content 1fr max-content; gap:.5rem .6rem; align-items:center; font-size:12px;}
.dist .drow{display:contents;}
.dist .dname{white-space:nowrap; color:var(--val); font-weight:600;}
.dist .dbar{height:9px; border-radius:9999px; background:var(--section-bg); overflow:hidden; min-width:20px;}
.dist .dbar > span{display:block; height:100%; background:var(--accent); border-radius:9999px;}
.dist .dpct{text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--caption); font-weight:600;}

/* Meilleures routes (7 j) */
.rk{display:grid; grid-template-columns:max-content 1fr max-content; gap:.55rem .65rem; align-items:center; font-size:12px;}
.rk .rrow{display:contents;}
.rk .rlabel{white-space:nowrap;}
.rk .rpath{font-weight:600; color:var(--val);}
.hops-hidden{cursor:help; display:inline-flex; vertical-align:-4px;}
.hops-hidden svg{width:18px; height:18px;}
.hops-hidden svg path{fill:var(--section-bg); stroke:var(--heading); stroke-width:1.6; stroke-linejoin:round;}
.rk .rtools{color:var(--caption); font-weight:500;}
.rk .rbar{min-width:20px; height:9px; border-radius:9999px; background:var(--section-bg); overflow:hidden;}
.rk .rbar > span{display:block; height:100%; background:var(--accent); border-radius:9999px;}
.rk .rpct{text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--caption); font-weight:600;}


/* P2 : classes textuelles passées à --caption */
.limited-note{font-size:11px; color:var(--caption); margin:.4rem 0 0; padding:.3rem .6rem; border-left:2px solid var(--card-border);}
/* P3 : textes d'aide lisibles */
.help{font-size:13px; color:var(--caption); line-height:1.45; font-style:normal;}

/* Modal overlay / card */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:.7rem;padding:1.2rem 1.3rem;max-width:440px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.25)}
</style>
</head>

// ─── Timezone client ──────────────────────────────────────────────────────────
function localOffset() {
  const now = new Date();
  const paris = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
  const utc = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  return Math.round((paris - utc) / 3600000);
}
function nowLocalHour() {
  const d = new Date();
  return parseInt(d.toLocaleString('en-US', { timeZone: 'Europe/Paris', hour: 'numeric', hour12: false }), 10) % 24;
}
function todayLocalDow() {
  const d = new Date();
  const dayStr = d.toLocaleString('en-US', { timeZone: 'Europe/Paris', weekday: 'short' });
  const map = { Sun: 6, Mon: 0, Tue: 1, Wed: 2, Thu: 3, Fri: 4, Sat: 5 };
  return map[dayStr] ?? 0;
}

function rotateUtc(arr, offsetH) {
  if (!arr || arr.length !== 24) return arr;
  const r = new Array(24);
  for (let h = 0; h < 24; h++) r[(h + offsetH + 24) % 24] = arr[h];
  return r;
}
function rotateHeatUtc(heat, offsetH) {
  if (!heat || heat.length !== 7) return heat;
  return heat.map(row => rotateUtc(row, offsetH));
}

const fmt = n => n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function freshLabel(lastTickAt) {
  if (!lastTickAt) return `<span class="fresh"><span class="dot" style="background:var(--amber)"></span>${t('fresh_none')}</span>`;
  const diff = (Date.now() - new Date(lastTickAt).getTime()) / 60000;
  const color = diff < 30 ? 'var(--green)' : diff < 120 ? 'var(--amber)' : 'var(--red)';
  // Countdown text — rendered in a placeholder updated by setInterval
  return `<span class="fresh"><span class="dot" style="background:${color}"></span><span id="countdown">${computeCountdownText()}</span></span>`;
}

function computeCountdownText() {
  if (nextTickAt === null) {
    // If we have meta, show elapsed ago instead (fallback pre-nextTickAt set)
    return t('countdown_imminent');
  }
  const secLeft = Math.round((nextTickAt - Date.now()) / 1000);
  if (secLeft <= 0) return t('countdown_imminent');
  const m = Math.floor(secLeft / 60);
  const s = secLeft % 60;
  return t('countdown_label', m, s);
}

function agoLabel(lastTickAt) {
  if (!lastTickAt) return '';
  const diff = Math.round((Date.now() - new Date(lastTickAt).getTime()) / 60000);
  return t('last_release_ago', diff);
}

function routeFromParts(parts, big) {
  if (!parts || parts.length === 0) return '';
  return '<div class="routeline">' + parts.map(p => {
    if (p.tool !== undefined) {
      return `<span class="leg">${tool(p.tool)}<span class="ar">→</span></span>`;
    }
    const qtyClass = `qty${p.out ? ' o' : ''}${big ? ' big' : ''}`;
    return `<span class="rasset"><span class="asset${p.out ? ' out' : ''}">${p.asset}</span>${p.qty ? `<span class="${qtyClass}">${p.qty}</span>` : ''}</span>`;
  }).join('') + '</div>';
}

function routeSimple(sonde, netVal, src, pairUi, big) {
  const hops = pairUi === 'USDC'
    ? [{ asset: 'BLND', qty: `${sonde} BLND` }, { tool: src }, { asset: 'USDC', qty: `${fmt3(netVal)} USDC`, out: true }]
    : [{ asset: 'BLND', qty: `${sonde} BLND` }, { tool: src }, { asset: 'EURC', qty: `${fmt3(netVal)} EURC`, out: true }];
  return routeFromParts(hops, big);
}

// ─── Section temporelle : modèle + rendu (encart / hebdo / zoom) ────────────────
const hh2 = x => String(x).padStart(2, '0') + ' h';
const pctTxt = v => `${v >= 0 ? '+' : ''}${v.toFixed(2)} %`;

// Dérive moyennes/jour normalisées du prix (eff × sonde × prix ACTUEL), écarts, meilleurs/pires.
function timeModel(heatLocal, heatEffLocal, meta, pairUi) {
  const probe = Math.max(...((meta && meta.sondes && meta.sondes.length) ? meta.sondes : [750]));
  const blndUsd = (meta && meta.blndUsd) || 0;
  const eurUsd = (meta && meta.eurUsd) || 0;
  const spot = pairUi === 'EURC' ? (eurUsd > 0 ? blndUsd / eurUsd : 0) : blndUsd; // prix cible/BLND, fixe pour tous les jours
  const dayEff = heatEffLocal.map(row => { const v = row.filter(x => x != null); return v.length ? v.reduce((a, x) => a + x, 0) / v.length : null; });
  const effVals = dayEff.filter(x => x != null);
  const weekEff = effVals.length ? effVals.reduce((a, x) => a + x, 0) / effVals.length : null;
  const dayNet = dayEff.map(e => (e == null || spot <= 0) ? null : e * probe * spot);
  const dayVs = dayEff.map(e => (e == null || !weekEff) ? null : (e / weekEff - 1) * 100);
  let bestDay = -1, worstDay = -1, bv = -Infinity, wv = Infinity;
  dayEff.forEach((e, i) => { if (e == null) return; if (e > bv) { bv = e; bestDay = i; } if (e < wv) { wv = e; worstDay = i; } });
  let bestCell = null, worstCell = null, bc = -Infinity, wc = Infinity;
  heatLocal.forEach((row, d) => row.forEach((v, h) => { if (v == null) return; if (v > bc) { bc = v; bestCell = { d, h, v }; } if (v < wc) { wc = v; worstCell = { d, h, v }; } }));
  return { probe, spot, dayEff, weekEff, dayNet, dayVs, bestDay, worstDay, bestCell, worstCell };
}

      <div class="sub2">${t('slot_avoid')} : <span class="r">${days[m.worstCell.d]} ${hh2(m.worstCell.h)} · ${pctTxt(m.worstCell.v)}</span></div></div>` : '';
  const day = m.bestDay >= 0 ? `
    <div class="enck"><div class="l">${t('encart_best_day')}</div>
      <div class="v g">${days[m.bestDay]}</div><div class="s">${fmt(m.dayNet[m.bestDay])} · ${pctTxt(m.dayVs[m.bestDay])} ${t('per_week')}</div>
      <div class="sub2">${t('slot_avoid')} : <span class="r">${days[m.worstDay]} · ${pctTxt(m.dayVs[m.worstDay])} ${t('per_week')}</span></div></div>` : '';
  const now = `

      <div class="v ${nowVal == null ? '' : nowVal >= 0 ? 'g' : 'r'}">${days[today]} ${hh2(nowHour)}</div>

  return `<div class="enc">${slot}${day}${now}</div>`;
}

function hebdoHtml(m, heatLocal, today, sel) {
  const days = t('days');
  const allv = []; for (const row of heatLocal) for (const v of row) if (v != null) allv.push(v);
  if (allv.length === 0) return `<p class="help">${t('hmap_insufficient')}</p>`;
  const lo = Math.min(...allv), hi = Math.max(...allv), rg = (hi - lo) || 1;
  const col = x => `hsl(${Math.round(8 + (x - lo) / rg * 125)} 60% 46%)`;
  let html = '';
  for (let d = 0; d < 7; d++) {
    const cells = (heatLocal[d] || []).map((v, h) => v == null
      ? `<span class="hc" style="background:var(--card-border)"></span>`
      : `<span class="hc" style="background:${col(v)}" title="${days[d]} ${hh2(h)} · ${v > 0 ? '+' : ''}${v.toFixed(2)} %"></span>`).join('');
    const meanTxt = m.dayNet[d] == null ? '—' : `${fmt(m.dayNet[d])}<small>${m.dayVs[d] >= 0 ? '+' : ''}${m.dayVs[d].toFixed(2)} % ${t('per_week')}</small>`;
    html += `<div class="hrow${d === sel ? ' sel' : ''}" onclick="selectDay(${d})">
      <div class="hlbl${d === m.bestDay ? ' best' : ''}">
        <span class="hday">${days[d]}${d === m.bestDay ? ' ★' : ''}</span>
        <span class="hmean">${meanTxt}</span>
        ${d === today ? `<span class="htd">${t('today_badge')}</span>` : ''}
      </div><div class="hcells">${cells}</div></div>`;
  }
  return `<div class="heb">${html}</div>`;
}

function zoomHtml(m, heatEffLocal, sel, today, nowHour, u) {
  const days = t('days');
  const de = m.dayEff[sel];
  const meanLine = m.dayNet[sel] == null ? '—' : `${fmt(m.dayNet[sel])}<small style="font-size:12px;color:var(--sub)"> ${u}</small>`;
  const vsLine = m.dayVs[sel] == null ? '' : `${m.dayVs[sel] >= 0 ? '+' : ''}${m.dayVs[sel].toFixed(2)} % ${t('vs_week')}`;
  const kpi = `<div class="zmk"><span class="k">${t('day_avg')} · ${days[sel]}</span><span class="v">${meanLine}</span><span class="s" style="color:${(m.dayVs[sel] || 0) >= 0 ? 'var(--green)' : 'var(--red)'}">${vsLine}</span></div>`;
  const dev = (heatEffLocal[sel] || []).map(e => (e == null || !de) ? null : (e / de - 1) * 100);
  zoomDev = dev;
  const axis = `<div class="zaxis"><span>00</span><span>03</span><span>06</span><span>09</span><span>12</span><span>15</span><span>18</span><span>21</span></div>`;
  if (dev.filter(x => x != null).length === 0) return `<div class="zm">${kpi}<div><p class="help">${t('hmap_insufficient')}</p></div></div>`;
  const W = 520, H = 120, mid = H / 2, n = 24, sx = W / (n - 1), sc = 44 / 0.8;
  const pts = dev.map((v, i) => [i * sx, mid - (v == null ? 0 : Math.max(-mid + 4, Math.min(mid - 4, v * sc)))]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = `M0,${mid} ` + pts.map(p => 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + ` L${W},${mid} Z`;
  const showNow = sel === today && dev[nowHour] != null;
  const nX = (nowHour * sx).toFixed(1), nY = pts[nowHour][1].toFixed(1);
  const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="120" preserveAspectRatio="none" style="overflow:visible">
    <defs><clipPath id="zab"><rect x="0" y="0" width="${W}" height="${mid}"/></clipPath><clipPath id="zbe"><rect x="0" y="${mid}" width="${W}" height="${H - mid}"/></clipPath></defs>
    <path d="${area}" fill="var(--green)" fill-opacity=".45" clip-path="url(#zab)"/>
    <path d="${area}" fill="var(--red)" fill-opacity=".45" clip-path="url(#zbe)"/>
    <line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="var(--sub)" stroke-dasharray="4 4"/>
    <path d="${line}" fill="none" stroke="var(--heading)" stroke-width="2.5"/>
    ${showNow ? `<circle class="pulse" cx="${nX}" cy="${nY}" r="6.5" fill="none" stroke="var(--val)" stroke-width="2"/><circle cx="${nX}" cy="${nY}" r="3" fill="var(--val)"/>` : ''}
  </svg>`;
  return `<div class="zm">${kpi}<div><div class="zwrap" onmousemove="zoomMove(event,this)" onmouseleave="zoomLeave()">${svg}<div class="zcursor" id="zcur"></div><div class="ztip" id="ztip"></div></div>${axis}</div></div>`;
}

function selectDay(d) { selDay = d; renderApp(); }
function zoomMove(e, el) {
  const r = el.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  const h = Math.round(frac * 23);
  const cur = document.getElementById('zcur'), tip = document.getElementById('ztip');
  if (!cur || !tip || zoomDev[h] == null) { if (cur) cur.style.display = 'none'; if (tip) tip.style.display = 'none'; return; }
  const left = (h / 23 * 100) + '%';
  cur.style.left = left; cur.style.display = 'block';
  tip.style.left = left; tip.style.display = 'block';
  tip.textContent = `${hh2(h)} · ${zoomDev[h] >= 0 ? '+' : ''}${zoomDev[h].toFixed(2)} %`;
}
function zoomLeave() { const c = document.getElementById('zcur'), p = document.getElementById('ztip'); if (c) c.style.display = 'none'; if (p) p.style.display = 'none'; }

// ─── Bouton Rafraîchir (helper plus bas) ────────────────────────────────────────

// ─── Bouton Rafraîchir ────────────────────────────────────────────────────────
function refreshHtml() {
  const disabled = refreshing ? 'disabled' : '';
  const label = refreshing ? t('refresh_loading') : t('refresh_btn');
  const msg = refreshMsg ? `<span class="refresh-note">${refreshMsg}</span>` : '';
  return `<span class="refresh-wrap">
    <button class="btn" onclick="doRefresh()" ${disabled} title="${t('refresh_note')}">${label}</button>
    ${msg}
  </span>`;
}

// ─── Page principale ──────────────────────────────────────────────────────────
function buildPage() {
  const u = target;
  const meta = overview ? overview.meta : null;
  const nTicksOk = meta ? meta.nTicksOk : 0;
  const limitedNote = nTicksOk < 24
    ? `<p class="limited-note">${t('limited_note', nTicksOk)}</p>`
    : '';
  const noData = nTicksOk === 0
    ? `<p class="help" style="margin:.6rem 0">${t('no_data_waiting')}</p>`
    : null;

  // Met à jour nextTickAt depuis le meta (fait une fois par render)
  if (meta && meta.lastTickAt && meta.cadenceSec) {
    nextTickAt = new Date(meta.lastTickAt).getTime() + meta.cadenceSec * 1000;
  }

  // Timezone locale
  const offsetH = localOffset();
  const NOW_HOUR = nowLocalHour();
  const TODAY = todayLocalDow();

  const heatLocal = overview ? rotateHeatUtc(overview.heatUtc, offsetH) : Array.from({length:7}, () => new Array(24).fill(null));
  const heatEffLocal = overview ? rotateHeatUtc(overview.heatEffUtc, offsetH) : Array.from({length:7}, () => new Array(24).fill(null));
  const tm = timeModel(heatLocal, heatEffLocal, meta, target);
  if (selDay < 0 || selDay > 6) selDay = TODAY;

  // Sondes dynamiques depuis meta (fallback [250,750] si pas encore chargé)
  const sondes = meta && meta.sondes && meta.sondes.length > 0 ? meta.sondes : [250, 750];

  // Réconcilier ladderSonde avec les sondes disponibles
  if (!sondes.includes(ladderSonde)) ladderSonde = sondes[0];

  // Échelle courante
  let ladderZoneTitle = t('section_ladder');
  let ladderZoneRight = '';
  let ladderContent = '';
  if (simActive && simResult) {
    ladderZoneRight = `<span class="tag">${t('ladder_sim_tag', fmt0(simAmt), u)}</span>`;
    ladderContent = ladderTable(simResult.ladder, u);
  } else {
    ladderZoneRight = `<span class="seg">${sondes.map(n =>
      `<button class="${ladderSonde===n?'active':''}" onclick="setSonde(${n})">${n} BLND</button>`
    ).join('')}</span>`;
    const rows = overview ? overview.ladders[String(ladderSonde)] : null;
    ladderContent = ladderTable(rows || [], u);
  }

  const dist = overview ? overview.winnerDist : [];

  // Fraîcheur + compte à rebours
  const freshHtml = meta ? freshLabel(meta.lastTickAt) : `<span class="fresh">${t('loading')}</span>`;

  // Glyphe thème : reflète l'action (clic vers l'autre thème)
  const isDark = document.documentElement.classList.contains('dark');
  const themeGlyph = isDark ? t('theme_light') : t('theme_dark');

  // Glyphe langue : affiche la cible (langue vers laquelle on bascule)
  const langGlyph = lang === 'fr' ? t('lang_en') : t('lang_fr');
  const langTitle = lang === 'fr' ? t('lang_en_title') : t('lang_fr_title');

  return `
  <div class="topbar">
    <span class="brand">stellarswap <span class="dim">· ${t('brand_dim')}</span></span>
    ${freshHtml}
    ${refreshHtml()}
    <span class="topbar-right">
      ${walletAddress
        ? `<span style="display:inline-flex;align-items:center;gap:.35rem">
            <span class="ctrl-btn" style="cursor:default;font-variant-numeric:tabular-nums">${shortAddr(walletAddress)}</span>
            <button class="ctrl-btn" onclick="disconnectWallet()">${t('wallet_disconnect')}</button>
           </span>`
        : `<button class="ctrl-btn" onclick="connectWallet()">${t('connect_wallet')}</button>`}
      <button class="ctrl-btn" onclick="toggleTheme()" title="${isDark ? t('theme_light') : t('theme_dark')}">${themeGlyph}</button>
      <button class="ctrl-btn" onclick="toggleLang()" title="${langTitle}" style="font-size:18px;line-height:1;padding:1px 7px">${langGlyph}</button>
    </span>
  </div>

  <div class="zone"><div class="zone-h">${t('section_sim')} BLND → ${u}<span class="pagenav" style="margin-left:auto">
      <button class="${target==='USDC'?'active':''}" onclick="setTarget('USDC')">${t('pair_usdc')}</button>
      <button class="${target==='EURC'?'active':''}" onclick="setTarget('EURC')">${t('pair_eurc')}</button>
    </span></div>${simCard()}</div>

  <div class="zone"><div class="zone-h">${ladderZoneTitle} <span class="right">${ladderZoneRight}</span></div>
    <div class="ladder-wrap${simLoading || refreshing ? ' refreshing' : ''}"><div class="ladder-inner">${ladderContent}</div>${simLoading || refreshing ? `<div class="refresh-overlay"><span class="refresh-spinner"></span>${simLoading ? t('sim_loading') : t('refresh_loading')}</div>` : ''}</div></div>

  <div class="zone"><div class="zone-h">${t('section_slots', u)} <span class="right muted" style="font-size:11px">${t('section_slots_note')}</span></div>
    <div class="card">
      ${noData || `${encartHtml(tm, heatLocal, TODAY, NOW_HOUR)}${hebdoHtml(tm, heatLocal, TODAY, selDay)}${limitedNote}`}
    </div></div>

  <div class="zone"><div class="zone-h">${t('section_hourly')} <span class="tznote" style="text-transform:none;letter-spacing:0;font-weight:400">${t('tz_note')}</span></div>
    <div class="card">${noData || zoomHtml(tm, heatEffLocal, selDay, TODAY, NOW_HOUR, u) + limitedNote}</div></div>

  <div class="zone"><div class="zone-h">${t('section_routes')}</div>
    <div class="card">
      ${bestRoutesCard()}${limitedNote}
      <p class="help" style="margin:.6rem 0 0">${u==='USDC'?t('dist_note_usdc'):t('dist_note_eurc')}</p></div>
  </div>

  <div class="zone"><div class="zone-h">${t('section_who')}</div>
    <div class="card">
      ${noData || distBars(dist) + limitedNote}
    </div>
  </div>
  ${execModal()}`;
}

function renderApp() {
  document.getElementById('app').innerHTML = buildPage();
}

// ─── Chargement des données ───────────────────────────────────────────────────
async function loadOverview() {
  try {
    const r = await fetch(`/api/overview?pair=${target}`);
    if (r.ok) overview = await r.json();
  } catch {}
  renderApp();
}

async function loadBalance() {
  try {
    const url = walletAddress ? `/api/balance?address=${walletAddress}` : '/api/balance';
    const r = await fetch(url);
    if (r.ok) {
      const b = await r.json();
      walletBlnd = b.blnd || 0;
      walletConfigured = b.configured !== false;
    }
  } catch {}
}

// ─── Compte à rebours (setInterval unique) ───────────────────────────────────
function startCountdownTick() {
  if (countdownInterval) return; // déjà actif
  countdownInterval = setInterval(() => {
    const el = document.getElementById('countdown');
    if (el) el.textContent = computeCountdownText();
    // Échéance dépassée : re-fetch périodique jusqu'à ce que le collecteur ait tické,
    // sinon le compte à rebours reste figé sur « imminent ».
    if (nextTickAt !== null && Date.now() >= nextTickAt && Date.now() - lastImminentPollAt > 20000) {
      lastImminentPollAt = Date.now();
      void loadOverview();
    }
  }, 1000);
}

// ─── Actions utilisateur ──────────────────────────────────────────────────────
function setTarget(t2) {
  target = t2;
  simResult = null;
  overview = null;
  refreshMsg = '';
  history.replaceState(null, '', '?pair=' + target);
  renderApp();
  void loadOverview();
}

function setSonde(n) {
  ladderSonde = n;
  renderApp();
}

function onAmt(v) {
  const n = parseFloat(String(v).replace(/\s| /g,'').replace(',','.'));
  if (!isNaN(n) && n > 0) { simAmt = n; simActive = true; }
  else { simActive = false; }
}

function clearSim() {
  simActive = false;
  simResult = null;
  renderApp();
}

function useWallet() {
  if (!walletConfigured || walletBlnd <= 0) return;
  simAmt = walletBlnd;
  simActive = true;
  renderApp();
  void doSim();
}

async function doSim() {
  if (!simActive || simAmt <= 0) return;
  simLoading = true;
  simResult = null;
  renderApp();
  try {
    const r = await fetch(`/api/quote?pair=${target}&amount=${simAmt}`);
    if (r.ok) simResult = await r.json();
  } catch {}
  simLoading = false;
  renderApp();
}

async function doRefresh() {
  if (refreshing) return;
  refreshing = true;
  refreshMsg = '';
  renderApp();
  try {
    const r = await fetch(`/api/refresh?pair=${target}`, { method: 'POST' });
    if (r.status === 429) {
      refreshMsg = t('refresh_429');
    } else if (r.ok) {
      const data = await r.json();
      if (data.overview) {
        overview = data.overview;
        // Réinitialise nextTickAt depuis le nouveau overview
        const meta = overview.meta;
        if (meta && meta.lastTickAt && meta.cadenceSec) {
          nextTickAt = new Date(meta.lastTickAt).getTime() + meta.cadenceSec * 1000;
        }
      }
      refreshMsg = '';
    }
  } catch {}
  refreshing = false;
  renderApp();
}

// ─── Wallet helpers ───────────────────────────────────────────────────────────
function shortAddr(a) {
  return a.slice(0, 4) + '…' + a.slice(-4);
}

// Échappe le HTML : tout texte d'origine serveur (errorMsg) passe par là avant innerHTML.
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function mapExecError(code, fallback) {
  const key = 'err_' + String(code).replace('-', ''); // 'no-route' → clé 'err_noroute'
  const s = STRINGS[lang];
  if (s && s[key] !== undefined) return t(key);
  return fallback || code;
}

async function connectWallet() {
  try {
    await ensureKit();
    const { address } = await SWK.authModal();
    walletAddress = address;
    localStorage.setItem('walletAddress', address);
    await loadBalance();
    renderApp();
  } catch (e) { /* user closed modal: ignore */ }
}

async function disconnectWallet() {
  try { await ensureKit(); await SWK.disconnect(); } catch (e) { /* ignore */ }
  walletAddress = null;
  localStorage.removeItem('walletAddress');
  walletBlnd = 0;
  walletConfigured = false;
  renderApp();
}

// ─── Exécution swap ───────────────────────────────────────────────────────────
async function doExecute() {
  if (!simResult || !simActive || simAmt <= 0) return;
  if (!walletAddress) {
    execState = { phase: 'error', errorMsg: t('exec_connect_first') };
    renderApp();
    return;
  }
  const body = {
    pair: target,
    amount: simAmt,
    sender: walletAddress,
    slippageBps: Math.round(execSlippagePct * 100),
    displayed: simResult.best ? { winner: simResult.best.display, net: simResult.best.net } : undefined,
  };
  try {
    const r = await fetch('/api/build', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const j = await r.json();
    if (!r.ok) { execState = { phase: 'error', errorMsg: mapExecError(j.code, j.error) }; }
    else { execState = { phase: 'review', build: j }; }
  } catch (e) { execState = { phase: 'error', errorMsg: t('err_down') }; }
  renderApp();
}

async function confirmExecute() {
  const build = execState && execState.build; if (!build) return;
  execState = { phase: 'signing', build }; renderApp();
  try {
    await ensureKit();
    const { signedTxXdr } = await SWK.signTransaction(build.xdr, { address: walletAddress, networkPassphrase: KIT_NET });
    execState = { phase: 'submitting', build }; renderApp();
    const r = await fetch('/api/submit', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ venue: build.venue, id: build.id, signedXdr: signedTxXdr }) });
    const j = await r.json();
    if (!r.ok) { execState = { phase: 'error', errorMsg: mapExecError(j.code, j.error) }; renderApp(); return; }
    if (build.type === 'restore') {
      // la tx restore est soumise ; reconstruire le vrai swap puis revenir à la revue.
      // ponytail: branche restore best-effort, non testée en live (nécessite un contrat archivé).
      await doExecute(); return;
    }
    execState = { phase: 'done', hash: j.hash, venue: build.venue }; renderApp();
  } catch (e) { execState = { phase: 'error', errorMsg: (e && e.message) || t('exec_failed') }; renderApp(); }
}

function cancelExecute() {
  execState = null;
  renderApp();
}

function onExecSlippage(v) {
  const n = parseFloat(String(v).replace(',', '.'));
  execSlippagePct = isNaN(n) ? 0.5 : Math.max(0, Math.min(50, n));
}

// ─── Modal d'exécution ────────────────────────────────────────────────────────
function execModal() {
  if (!execState) return '';
  const { phase, build, hash, errorMsg } = execState;

  let content = '';
  if (phase === 'review') {
    const rv = build.review;
    const venueLabel = rv.venue === 'xbull' ? 'xBull' : rv.venue === 'soroswap' ? 'Soroswap' : rv.venue;
    const fidelityNote = rv.fidelity
      ? `<p class="help" style="margin:.6rem 0 0">${t('review_fidelity', rv.fidelity.displayedWinner, fmt3(rv.fidelity.displayedWinnerNet))}</p>`
      : '';
    // Disclosure restore AVANT signature : la 1re signature restaure l'état du contrat, le swap est rebuild + re-revu ensuite.
    const restoreNote = build.type === 'restore'
      ? `<p class="help" style="margin:.6rem 0 0;color:var(--amber)">${t('exec_restore')}</p>`
      : '';
    content = `
      <div style="font-size:14px;font-weight:700;margin-bottom:.9rem">${t('review_title')}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:.8rem">
        <tr><td style="padding:4px 0;color:var(--caption)">${t('review_route')}</td><td style="padding:4px 0;text-align:right">${renderRoute(rv.route)}</td></tr>
        <tr><td style="padding:4px 0;color:var(--caption)">${t('review_send')}</td><td style="padding:4px 0;text-align:right;font-weight:600">${fmt3(rv.sendAmount)} BLND</td></tr>
        <tr><td style="padding:4px 0;color:var(--caption)">${t('review_expected')}</td><td style="padding:4px 0;text-align:right">${fmt3(rv.netOut)} ${target}</td></tr>
        <tr><td style="padding:4px 0;color:var(--caption);font-weight:600">${t('review_receive_min')}</td><td style="padding:4px 0;text-align:right;font-weight:700;color:var(--green)">${fmt3(rv.minReceived)} ${target}</td></tr>
        <tr><td style="padding:4px 0;color:var(--caption)">${t('review_venue')}</td><td style="padding:4px 0;text-align:right">${venueLabel}</td></tr>
        <tr><td style="padding:4px 0;color:var(--caption)">${t('review_slippage')}</td><td style="padding:4px 0;text-align:right">${rv.slippageBps / 100} %</td></tr>
      </table>
      ${fidelityNote}
      ${restoreNote}
      <div style="display:flex;gap:.55rem;margin-top:.9rem;justify-content:flex-end">
        <button class="btn" onclick="cancelExecute()">${t('review_cancel')}</button>
        <button class="btn primary" onclick="confirmExecute()">${t('review_confirm')}</button>
      </div>`;
  } else if (phase === 'signing') {
    content = `<p class="help" style="margin:0">${t('exec_signing')}</p>`;
  } else if (phase === 'submitting') {
    const restoreNote = build && build.type === 'restore'
      ? `<p class="help" style="margin:.5rem 0 0">${t('exec_restore')}</p>`
      : '';
    content = `<p class="help" style="margin:0">${t('exec_submitting')}</p>${restoreNote}`;
  } else if (phase === 'done') {
    content = `
      <p style="font-size:14px;font-weight:700;color:var(--green);margin:0 0 .6rem">${t('exec_success')}</p>
      <a class="openlink" href="https://stellar.expert/explorer/public/tx/${hash}" target="_blank" rel="noopener">${t('exec_view')}</a>
      <div style="margin-top:.9rem;text-align:right">
        <button class="btn" onclick="cancelExecute()">${t('exec_close')}</button>
      </div>`;
  } else if (phase === 'error') {
    content = `
      <p style="font-size:14px;font-weight:700;color:var(--red);margin:0 0 .5rem">${t('exec_failed')}</p>
      <p class="help" style="margin:0 0 .8rem">${escapeHtml(errorMsg)}</p>
      <div style="text-align:right">
        <button class="btn" onclick="cancelExecute()">${t('exec_close')}</button>
      </div>`;
  }

  return `<div class="modal-overlay"><div class="modal-card">${content}</div></div>`;
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  renderApp();
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  localStorage.setItem('lang', lang);
  renderApp();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
// Restitue le thème persisté (ou préférence système)
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.documentElement.classList.add('dark');
}

// Restitue la langue persistée
const savedLang = localStorage.getItem('lang');
if (savedLang === 'en' || savedLang === 'fr') lang = savedLang;

// P1 : lire la paire depuis l'URL (?pair=EURC)
(function() {
  const p = new URLSearchParams(location.search).get('pair');
  if (p === 'EURC' || p === 'USDC') target = p;
})();

renderApp();
startCountdownTick();
void Promise.all([loadOverview(), loadBalance()]);
</script>
