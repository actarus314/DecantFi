services:
  collector:
    image: ghcr.io/actarus314/stellarswap-collector:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    volumes:
      - /docker/stellarswap-collector/data:/app/data
    env_file: .env
    environment:
      - COLLECTOR_DB_PATH=/app/data/quotes.db
    networks:
      - stellarswap
    healthcheck:
      test: ["CMD", "node", "-e", "try{const{statSync}=require('node:fs');const m=statSync('/app/data/.heartbeat').mtimeMs;process.exit(Date.now()-m<2*Number(process.env.COLLECTOR_CADENCE_SEC||900)*1000?0:1)}catch{process.exit(1)}"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1000s   # > cadence par défaut (900s) : couvre le 1er intervalle ; + heartbeat de boot
    # backend pur : AUCUN bloc ports (n'expose rien).

networks:
  stellarswap:
    driver: bridge
