name: stellarswap
services:
  collector:
    image: ghcr.io/${IMAGE_OWNER:-actarus314}/stellarswap-collector:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        REV: ${REV:-dev}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    volumes:
      - ${STELLARSWAP_DATA:-./data}:/app/data
    env_file: .env
    environment:
      - COLLECTOR_DB_PATH=/app/data/quotes.db
    networks:
      - stellarswap
    healthcheck:
      test: ["CMD", "node", "-e", "try{const{statSync}=require('node:fs');const m=statSync('/app/data/.heartbeat').mtimeMs;process.exit(Date.now()-m<2*Number(process.env.COLLECTOR_CADENCE_SEC||900)*1000?0:1)}catch{process.exit(1)}"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 1000s   # > cadence par défaut (900s) : couvre le 1er intervalle ; + heartbeat de boot
    # backend pur : AUCUN bloc ports (n'expose rien).

  web:
    image: ghcr.io/${IMAGE_OWNER:-actarus314}/stellarswap-collector:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        REV: ${REV:-dev}
    command: ["node", "dist/web/server.js"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 256m
    ports:
      - "${WEB_HOST_PORT:-8080}:8080"   # NUC = 8080 ; surchargeable (port hôte occupé en dev)
    volumes:
      - ${STELLARSWAP_DATA:-./data}:/app/data
    env_file: .env
    environment:
      - COLLECTOR_DB_PATH=/app/data/quotes.db
    networks:
      - stellarswap
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/overview').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  stellarswap:
    driver: bridge
